<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takbo Running Coach — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img class="auth-logo-img" src="/images/logo.svg" alt="Takbo Running Coach" onerror="this.style.display='none';" />
    </div>
    <div class="auth-title">
      <span class="auth-title-takbo">TAKBO</span>
      <span class="auth-title-coach">RUNNING COACH</span>
    </div>
    <p class="auth-subtitle">Your personal running coach, built for Filipino runners</p>

    <!-- Google Sign-In -->
    <a href="/api/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider"><span>or</span></div>

    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-login"    onclick="showTab('login')">Sign In</button>
      <button class="tab-btn"        id="tab-register" onclick="showTab('register')">Create Account</button>
    </div>

    <div id="alert" class="alert alert-error hidden"></div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input class="form-control" type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input class="form-control" type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="login-btn">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input class="form-control" type="text" id="reg-name" placeholder="Alex Runner" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input class="form-control" type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input class="form-control" type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="register-btn">Create Account</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.href = "/dashboard.html";
  }

  // Show error if Google sign-in was denied or failed
  const googleParam = new URLSearchParams(window.location.search).get("google");
  if (googleParam === "denied") showError("Google sign-in was cancelled.");
  if (googleParam === "error")  showError("Google sign-in failed. Please try again.");

  function showTab(tab) {
    const isLogin = tab === "login";
    document.getElementById("login-form").classList.toggle("hidden", !isLogin);
    document.getElementById("register-form").classList.toggle("hidden", isLogin);
    document.getElementById("tab-login").classList.toggle("active", isLogin);
    document.getElementById("tab-register").classList.toggle("active", !isLogin);
    document.getElementById("alert").classList.add("hidden");
  }

  function showError(msg) {
    const el = document.getElementById("alert");
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("login-btn");
    btn.disabled = true;
    btn.textContent = "Signing in…";
    document.getElementById("alert").classList.add("hidden");
    try {
      const data = await api.post("/auth/login", {
        email: document.getElementById("login-email").value,
        password: document.getElementById("login-password").value,
      });
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("user", JSON.stringify(data.user));
      localStorage.setItem("strava_sync_on_load", "1");
      window.location.href = "/dashboard.html";
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById("register-btn");
    btn.disabled = true;
    btn.textContent = "Creating account…";
    document.getElementById("alert").classList.add("hidden");
    const body = {
      name:     document.getElementById("reg-name").value,
      email:    document.getElementById("reg-email").value,
      password: document.getElementById("reg-password").value,
    };
    try {
      const data = await api.post("/auth/register", body);
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("user", JSON.stringify(data.user));
      // New users go through onboarding; returning users skip it
      window.location.href = data.user.onboarding_complete ? "/dashboard.html" : "/onboarding.html";
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  }
</script>
</body>
</html>
