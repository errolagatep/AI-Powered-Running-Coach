<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Runs — Takbo Running Coach</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <img class="navbar-logo" src="/images/logo.png" alt="Takbo" onerror="this.style.display='none';" />
    <span class="navbar-brand-text">
      <span class="navbar-brand-name">Takbo</span>
      <span class="navbar-brand-tagline">Running Coach</span>
    </span>
  </a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle-input" />
  <ul class="navbar-nav">
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/runs.html" class="active">Runs</a></li>
    <li><a href="/training_plan.html">Training Plan</a></li>
    <li><a href="/stats.html">Stats</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="/profile.html" class="navbar-user-link" id="navbar-user"></a>
    <button class="btn btn-secondary btn-logout" id="logout-btn">Sign out</button>
  </div>
  <label for="nav-toggle" class="nav-hamburger" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </label>
</nav>

<div class="container">
  <div class="page-header">
    <div class="section-header" style="margin-bottom:4px;">
      <h1 style="font-size:26px;font-weight:800;letter-spacing:-.4px;">All Runs</h1>
      <a href="/log_run.html" class="btn btn-primary">+ Log a Run</a>
    </div>
    <p style="color:var(--text-sec);margin-top:0;">Your complete running history</p>
  </div>

  <!-- Summary stats -->
  <div class="stats-grid" id="run-stats" style="margin-bottom:24px;"></div>

  <!-- Filter tabs -->
  <div class="runs-filter-bar">
    <button class="runs-filter-btn active" data-filter="all"    onclick="setFilter('all')">All Runs</button>
    <button class="runs-filter-btn"        data-filter="strava" onclick="setFilter('strava')">Strava</button>
    <button class="runs-filter-btn"        data-filter="manual" onclick="setFilter('manual')">Manual</button>
  </div>

  <div id="runs-loading" class="loading"><div class="spinner"></div> Loading runs…</div>

  <div id="run-list" class="run-list hidden"></div>

  <div id="load-more-wrap" class="hidden" style="text-align:center;margin-top:20px;">
    <button class="btn btn-secondary" id="load-more-btn" onclick="loadMore()">Load more runs</button>
  </div>

  <div id="no-runs" class="empty-state hidden">
    <div class="empty-icon">👟</div>
    <h3>No runs yet!</h3>
    <p>Log your first run to start tracking your progress.</p>
    <a href="/log_run.html" class="btn btn-primary">Log Your First Run</a>
  </div>

  <div id="no-filter-results" class="empty-state hidden">
    <div class="empty-icon">🔍</div>
    <h3>No runs match this filter</h3>
    <p id="no-filter-msg"></p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/runs.js"></script>
<script src="/js/log_modal.js"></script>
</body>
</html>
