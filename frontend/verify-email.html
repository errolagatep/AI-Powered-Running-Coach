<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Takbo Running Coach</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card verify-card">
    <div class="auth-logo">
      <img class="auth-logo-img" src="/images/logo.png" alt="Takbo Running Coach" onerror="this.style.display='none';" />
    </div>
    <div class="auth-title">
      <span class="auth-title-takbo">TAKBO</span>
      <span class="auth-title-coach">RUNNING COACH</span>
    </div>

    <!-- Verifying state (shown by default until hash is parsed) -->
    <div id="state-loading" class="verify-state active">
      <div class="verify-spinner-wrap">
        <div class="spinner verify-spinner"></div>
      </div>
      <p class="verify-loading-msg">Verifying your email…</p>
    </div>

    <!-- Success state -->
    <div id="state-success" class="verify-state">
      <div class="verify-icon-wrap verify-icon-success" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 15.5L12 22.5L25 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="verify-title">Email verified!</h2>
      <p class="verify-msg">Your account is ready. You'll be signed in automatically.</p>
      <p class="verify-countdown" id="success-countdown">Redirecting in <strong>5</strong>s</p>
      <a href="/index.html" class="btn btn-primary btn-full verify-cta">Sign in now</a>
    </div>

    <!-- Error state -->
    <div id="state-error" class="verify-state">
      <div class="verify-icon-wrap verify-icon-error" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 8L22 22M22 8L8 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="verify-title">Verification failed</h2>
      <p class="verify-msg" id="error-msg">This link is invalid or has expired.</p>
      <a href="/index.html" class="btn btn-primary btn-full verify-cta">Back to Sign In</a>
    </div>
  </div>
</div>

<script>
  // Supabase redirects here after verifying the token.
  // Hash params: #access_token=...&type=signup  (success)
  //              #error=...&error_description=... (failure)
  const hash  = new URLSearchParams(window.location.hash.slice(1));
  const type  = hash.get("type");
  const error = hash.get("error_description") || hash.get("error");

  function showState(id) {
    // Hold the loading state briefly so the transition reads as intentional
    setTimeout(() => {
      document.getElementById("state-loading").classList.remove("active");
      document.getElementById(id).classList.add("active");
    }, 600);
  }

  if (error) {
    document.getElementById("error-msg").textContent = decodeURIComponent(error);
    showState("state-error");
  } else if (type === "signup" || type === "email") {
    showState("state-success");
    // Auto-redirect countdown: 5 → 0, then navigate
    let secs = 5;
    const strong = document.querySelector("#success-countdown strong");
    const timer = setInterval(() => {
      secs--;
      if (strong) strong.textContent = secs;
      if (secs <= 0) {
        clearInterval(timer);
        window.location.href = "/index.html";
      }
    }, 1000);
  } else {
    // Direct visit with no params — confused user
    document.getElementById("error-msg").textContent =
      "No verification token found. Please use the link from your email.";
    showState("state-error");
  }
</script>
</body>
</html>
