<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress — AI Running Coach</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">🏃 RunCoach</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/log_run.html">Log Run</a></li>
    <li><a href="/training_plan.html">Training Plan</a></li>
    <li><a href="/progress.html" class="active">Progress</a></li>
  </ul>
  <div class="navbar-actions">
    <span class="navbar-user" id="navbar-user"></span>
    <button class="btn btn-secondary" id="logout-btn" style="padding:6px 12px;font-size:13px;">Sign out</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Progress</h1>
    <p>Track your improvement over time</p>
  </div>

  <div id="progress-loading" class="loading"><div class="spinner"></div> Loading data…</div>

  <div id="progress-content" class="hidden">
    <!-- Lifetime stats -->
    <div class="stats-grid" style="margin-bottom:28px;" id="stats-grid"></div>

    <!-- Weekly mileage chart -->
    <div class="chart-card">
      <h2>📅 Weekly Mileage (last 12 weeks)</h2>
      <div class="chart-wrapper">
        <canvas id="weekly-chart"></canvas>
      </div>
    </div>

    <!-- Pace chart -->
    <div class="chart-card">
      <h2>⚡ Pace per Run (last 30 runs)</h2>
      <div class="chart-wrapper">
        <canvas id="pace-chart"></canvas>
      </div>
    </div>

    <!-- HR chart -->
    <div class="chart-card" id="hr-card">
      <h2>❤️ Average Heart Rate</h2>
      <div class="chart-wrapper">
        <canvas id="hr-chart"></canvas>
      </div>
    </div>
  </div>

  <div id="no-data" class="empty-state hidden">
    <div class="empty-icon">📊</div>
    <h3>No data yet</h3>
    <p>Log at least one run to see your progress charts.</p>
    <a href="/log_run.html" class="btn btn-primary">Log a Run</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/progress.js"></script>
</body>
</html>
