<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress — Takbo Running Coach</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <img class="navbar-logo" src="/images/logo.svg" alt="Takbo" onerror="this.style.display='none';" />
    <span class="navbar-brand-text">
      <span class="navbar-brand-name">Takbo</span>
      <span class="navbar-brand-tagline">Running Coach</span>
    </span>
  </a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle-input" />
  <ul class="navbar-nav">
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/runs.html">Runs</a></li>
    <li><a href="/training_plan.html">Training Plan</a></li>
    <li><a href="/stats.html" class="active">Stats</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="/profile.html" class="navbar-user-link" id="navbar-user"></a>
    <button class="btn btn-secondary btn-logout" id="logout-btn">Sign out</button>
  </div>
  <label for="nav-toggle" class="nav-hamburger" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </label>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Progress</h1>
    <p>Track your improvement over time</p>
  </div>

  <div id="progress-loading" class="loading"><div class="spinner"></div> Loading data…</div>

  <div id="progress-content" class="hidden">
    <!-- Lifetime stats -->
    <div class="stats-grid" style="margin-bottom:28px;" id="stats-grid"></div>

    <!-- Weekly mileage chart -->
    <div class="chart-card">
      <h2><i data-lucide="calendar" class="icon"></i> Weekly Mileage (last 12 weeks)</h2>
      <div class="chart-wrapper">
        <canvas id="weekly-chart"></canvas>
      </div>
    </div>

    <!-- Pace chart -->
    <div class="chart-card">
      <h2><i data-lucide="zap" class="icon"></i> Pace per Run (last 30 runs)</h2>
      <div class="chart-wrapper">
        <canvas id="pace-chart"></canvas>
      </div>
    </div>

    <!-- HR chart -->
    <div class="chart-card" id="hr-card">
      <h2><i data-lucide="heart" class="icon"></i> Average Heart Rate</h2>
      <div class="chart-wrapper">
        <canvas id="hr-chart"></canvas>
      </div>
    </div>
  </div>

  <div id="no-data" class="empty-state hidden">
    <div class="empty-icon"><i data-lucide="bar-chart-2" class="icon"></i></div>
    <h3>No data yet</h3>
    <p>Log at least one run to see your progress charts.</p>
    <a href="/log_run.html" class="btn btn-primary">Log a Run</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/progress.js"></script>
<script src="/js/log_modal.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => lucide.createIcons());</script>
</body>
</html>
