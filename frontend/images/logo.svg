<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9040"/>
      <stop offset="100%" stop-color="#E85500"/>
    </linearGradient>
  </defs>

  <!-- Speed lines (motion streaks) -->
  <line x1="1"  y1="15" x2="7"  y2="15" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="0"  y1="21" x2="6"  y2="21" stroke="#F97316" stroke-width="2"   stroke-linecap="round" opacity="0.45"/>
  <line x1="1"  y1="27" x2="6"  y2="27" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Head -->
  <circle cx="27" cy="7" r="4" fill="url(#rg)"/>

  <!-- Torso (forward lean ~40°) -->
  <line x1="26" y1="11" x2="19" y2="21"
        stroke="url(#rg)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Front arm (reaching forward) -->
  <line x1="22.5" y1="15" x2="14" y2="11"
        stroke="url(#rg)" stroke-width="3" stroke-linecap="round"/>

  <!-- Back arm (trailing) -->
  <line x1="22.5" y1="15" x2="30" y2="19"
        stroke="url(#rg)" stroke-width="3" stroke-linecap="round"/>

  <!-- Front leg (reaching) -->
  <path d="M19 21 L12 28 L9 35"
        stroke="url(#rg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Back leg (push-off) -->
  <path d="M19 21 L25 28 L31 34"
        stroke="url(#rg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
