# fly.toml — generated for Fly.io deployment
# Replace "takbo-running-coach" with your actual app name from `fly launch`

app = "takbo-running-coach"
primary_region = "sin"  # Singapore — change to nearest: nrt (Tokyo), syd (Sydney), lax (LA)

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
